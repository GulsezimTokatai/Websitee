{% load static %}
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Тіркелу | GULsezim</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .error-box {
    background-color: #fff5f5; /* Өте ашық қызыл фон */
    color: #e53e3e;            /* Қанық қызыл мәтін */
    padding: 12px;
    margin-bottom: 20px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid #feb2b2;
    text-align: center;
    animation: shake 0.4s ease-in-out; /* Назар аудару үшін аздап дірілдеу */
}

/* Дірілдеу анимациясы (ерікті түрде) */
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}
        body { margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #fdfdfd; font-family: 'Montserrat', sans-serif; }
        .auth-container { width: 100%; max-width: 400px; padding: 40px; background: #fff; border: 1px solid #eee; box-shadow: 0 10px 40px rgba(0,0,0,0.02); text-align: center; }
        h1 { font-weight: 300; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 10px; }
        p.subtitle { color: #888; font-size: 13px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; padding: 15px; border: 1px solid #e0e0e0; font-family: 'Montserrat', sans-serif; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #000; }
        .btn-black { width: 100%; padding: 16px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; transition: 0.3s; }
        .btn-black:hover { background: #333; }
        .toggle-link { margin-top: 25px; font-size: 12px; color: #666; }
        .toggle-link a { color: #000; text-decoration: none; font-weight: 600; border-bottom: 1px solid #000; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h1>Тіркелу</h1>
        <p class="subtitle">GULsezim әлеміне қосылыңыз</p>

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
    {% endif %}

        <form method="POST" action="{% url 'register' %}">
{% csrf_token %}
    <div class="form-group">
        <label>Электронды пошта</label>
        <input type="email" name="email" placeholder="Болашақ логиніңіз" required>
    </div>

    <div class="form-group">
        <label>Құпия сөз ойлап табыңыз</label>
        <input type="password" name="password" placeholder="Кемі 8 белгі" required>
    </div>

    <button type="submit" class="btn-black">ТІРКЕЛУ ЖӘНЕ КІРУ</button>

    <div class="toggle-link">
        Аккаунтыңыз бар ма? <a href="{% url 'login' %}">Кіруге өту</a>
    </div>
</form>
    </div>

</body>
</html>
